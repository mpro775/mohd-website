name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/mohd-portfolio-test
          JWT_ACCESS_SECRET: test-access-secret-with-enough-length
          JWT_REFRESH_SECRET: test-refresh-secret-with-enough-length
          R2_ACCOUNT_ID: test-account
          R2_ACCESS_KEY_ID: test-key
          R2_SECRET_ACCESS_KEY: test-secret
          R2_BUCKET: test-bucket
          R2_PUBLIC_URL: https://files.example.test
